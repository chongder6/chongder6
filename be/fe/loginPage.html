<!DOCTYPE html>
<html>
<head>
    <meta charset = "utf-8">
    
    <title></title>
</head>
<body>
    <h1>login page</h1>
    <form id= "login"><br>
        <input required type="text" id="name" placeholder = "enter name"><br>
        <input required type="tel" id="phone" placeholder = "enter phone number"><br>
        <input required type="password" id="password" placeholder = "enter password">
        <button type="submit">login</button>
    </form>
    <script>
        document.getElementById("login").addEventListener("submit",
        async function (event)
    {
        event.preventDefault();//stops reloading page
        const name = document.getElementById("name").value;
        const phone = document.getElementById("phone").value;
        const password = document.getElementById("password").value;
        try{
            const response = await fetch ('/login',{
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({name,phone,password})
        })
        if (!response.ok){
            const text = await response.text();
            alert("Error:"+text);
            return;
        }
        const result = await response.json();
        alert('success'+response.message);
        }
        catch (error){
            console.log(error)
            
        }
    });
    </script>
    
</body>
</html>
